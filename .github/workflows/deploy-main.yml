name: Deploy to Azure App Service

on:
  push:
    branches: [cicd-setup]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: apps/frontend
        run: bun run build
        env:
          VITE_APP_TITLE: ${{ vars.VITE_APP_TITLE }}
          VITE_LOG_LEVEL: ${{ vars.VITE_LOG_LEVEL }}

      - name: Copy frontend build to backend public folder
        run: |
          mkdir -p apps/backend/public
          cp -r apps/frontend/dist/. apps/backend/public/

      - name: Build backend
        working-directory: apps/backend
        run: bun run build

      - name: Stage deployment package
        run: |
          rm -rf .azure-deploy
          mkdir -p .azure-deploy
          cp -r apps/backend/dist apps/backend/public apps/backend/package.json .azure-deploy/
          cd .azure-deploy
          npm install --omit=dev

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update environment variables in Azure App Service
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              {
                "name": "NODE_ENV",
                "value": "${{ vars.NODE_ENV }}"
              },
              {
                "name": "CORS_ORIGIN",
                "value": "${{ vars.CORS_ORIGIN }}"
              }
            ]

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./.azure-deploy
